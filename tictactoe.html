<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.8rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 16px 4px rgba(168, 218, 220, 0.4);
    }

    #controls {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    button {
      padding: 0.6rem 1.6rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }

    #restart {
      background: #e94560;
      color: #fff;
    }

    #mode-toggle {
      background: #0f3460;
      color: #a8dadc;
      border: 1px solid #a8dadc;
    }

    #score {
      margin-top: 1.5rem;
      display: flex;
      gap: 2rem;
      font-size: 1rem;
      color: #888;
    }

    #score span { color: #eee; font-weight: bold; }
  </style>
</head>
<body>
  <h1>TIC TAC TOE</h1>
  <div id="status">X's turn</div>
  <div id="board"></div>
  <div id="controls">
    <button id="restart">Restart</button>
    <button id="mode-toggle">vs CPU</button>
  </div>
  <div id="score">
    <div>X wins: <span id="score-x">0</span></div>
    <div>Draws: <span id="score-d">0</span></div>
    <div>O wins: <span id="score-o">0</span></div>
  </div>

  <script>
    const board = document.getElementById('board');
    const status = document.getElementById('status');
    const modeBtn = document.getElementById('mode-toggle');
    const scoreX = document.getElementById('score-x');
    const scoreO = document.getElementById('score-o');
    const scoreD = document.getElementById('score-d');

    let cells, state, current, gameOver, vsCPU;
    let scores = { X: 0, O: 0, D: 0 };
    vsCPU = false;

    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    function init() {
      state = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      status.textContent = "X's turn";
      board.innerHTML = '';
      cells = [];
      for (let i = 0; i < 9; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.i = i;
        cell.addEventListener('click', onCellClick);
        board.appendChild(cell);
        cells.push(cell);
      }
    }

    function onCellClick(e) {
      const i = +e.target.dataset.i;
      if (gameOver || state[i]) return;
      play(i);
      if (!gameOver && vsCPU && current === 'O') {
        setTimeout(cpuMove, 300);
      }
    }

    function play(i) {
      state[i] = current;
      cells[i].textContent = current;
      cells[i].classList.add('taken', current.toLowerCase());

      const winner = checkWinner();
      if (winner) {
        highlight(winner.line);
        status.textContent = `${current} wins!`;
        scores[current]++;
        updateScores();
        gameOver = true;
        return;
      }
      if (state.every(Boolean)) {
        status.textContent = "It's a draw!";
        scores.D++;
        updateScores();
        gameOver = true;
        return;
      }
      current = current === 'X' ? 'O' : 'X';
      status.textContent = `${current}'s turn`;
    }

    function checkWinner() {
      for (const line of WINS) {
        const [a, b, c] = line;
        if (state[a] && state[a] === state[b] && state[a] === state[c])
          return { player: state[a], line };
      }
      return null;
    }

    function highlight(line) {
      line.forEach(i => cells[i].classList.add('win'));
    }

    function updateScores() {
      scoreX.textContent = scores.X;
      scoreO.textContent = scores.O;
      scoreD.textContent = scores.D;
    }

    // Minimax CPU
    function cpuMove() {
      if (gameOver) return;
      const best = minimax(state, 'O');
      play(best.index);
    }

    function minimax(s, player) {
      const winner = checkWinnerFor(s);
      if (winner === 'O') return { score: 10 };
      if (winner === 'X') return { score: -10 };
      if (s.every(Boolean)) return { score: 0 };

      const moves = [];
      for (let i = 0; i < 9; i++) {
        if (s[i]) continue;
        s[i] = player;
        const result = minimax(s, player === 'O' ? 'X' : 'O');
        moves.push({ index: i, score: result.score });
        s[i] = null;
      }

      if (player === 'O') {
        const best = moves.reduce((a, b) => b.score > a.score ? b : a);
        return best;
      } else {
        const best = moves.reduce((a, b) => b.score < a.score ? b : a);
        return best;
      }
    }

    function checkWinnerFor(s) {
      for (const [a, b, c] of WINS) {
        if (s[a] && s[a] === s[b] && s[a] === s[c]) return s[a];
      }
      return null;
    }

    document.getElementById('restart').addEventListener('click', init);

    modeBtn.addEventListener('click', () => {
      vsCPU = !vsCPU;
      modeBtn.textContent = vsCPU ? 'vs Human' : 'vs CPU';
      init();
    });

    init();
  </script>
</body>
</html>
